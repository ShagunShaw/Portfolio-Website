<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume | Shagun Shaw</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#081321;
    overflow:hidden;
}

/* Download Button */

.download-btn{
    position:fixed;
    bottom:25px;
    right:25px;

    padding:14px 22px;

    background:rgba(31,111,139,.9);
    color:white;

    text-decoration:none;
    font-family:Arial,sans-serif;
    font-weight:600;

    border-radius:12px;

    backdrop-filter:blur(10px);

    box-shadow:0 5px 20px rgba(0,0,0,.4);

    transition:.3s;

    z-index:9999;
}

.download-btn:hover{
    transform:translateY(-3px);
}

/* PDF */

iframe{
    width:100%;
    height:100vh;
    border:none;
}

</style>
</head>

<body>

<a href="resume.pdf" download class="download-btn">
    ⬇ Download Resume
</a>

<iframe
src="resume.pdf#toolbar=0&navpanes=0&scrollbar=0">
</iframe>

</body>
</html>
